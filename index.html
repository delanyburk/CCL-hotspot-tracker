// ============================================================
// MB INVOICE PDF HANDLER
// Parses Mobile Beacon renewal invoice PDFs.
// Extracts IMEI + new expiration date from the invoice table,
// then updates matching hotspots exactly like a renewal report.
// ============================================================
function handleMBInvoicePDF(file) {
  showResult('result-mb-combined', '⟳ Reading PDF invoice…', 'info');
  takeSnapshot();

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      // Load pdf.js from CDN
      if (!window.pdfjsLib) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }

      const typedArray = new Uint8Array(e.target.result);
      const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;

      // Extract all text from all pages
      let fullText = '';
      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        fullText += content.items.map(i => i.str).join(' ') + '\n';
      }

      // Parse IMEI + expiration date pairs from the invoice table.
      // Invoice rows look like: "Franklin T10 / 351094080229410   04/10/2027   $120.00"
      // We extract any 14-16 digit number (IMEI) and the date following it.
      const renewals = [];
      // Match: product / IMEI ... date (MM/DD/YYYY)
      const rowPattern = /Franklin\s+T\d+\s*\/\s*(\d{14,16})[\s\S]*?(\d{1,2}\/\d{1,2}\/\d{4})/g;
      let match;
      while ((match = rowPattern.exec(fullText)) !== null) {
        const imei = match[1].trim();
        const dateStr = match[2].trim();
        // Convert MM/DD/YYYY → YYYY-MM-DD
        const [mo, da, yr] = dateStr.split('/');
        const isoDate = yr + '-' + mo.padStart(2, '0') + '-' + da.padStart(2, '0');
        renewals.push({ imei, exp_date: isoDate });
      }

      if (renewals.length === 0) {
        showResult('result-mb-combined', '❌ Could not find any device/date pairs in this PDF. Make sure it is a Mobile Beacon invoice.', 'error');
        return;
      }

      // Build IMEI → hotspot map
      const imeiMap = {};
      state.hotspots.forEach(h => { if (h.imei) imeiMap[h.imei] = h; });

      const changes = [];
      let updated = 0, unmatched = 0;

      renewals.forEach(({ imei, exp_date }) => {
        const h = imeiMap[imei];
        if (!h) {
          unmatched++;
          changes.push('IMEI ' + imei + ' — <span class="ch-old">not found in inventory</span>');
          return;
        }
        const oldExp = h.exp_date || 'none';
        if (exp_date !== oldExp) {
          changes.push('c.' + h.copy_num + ' (IMEI ' + imei + ') exp <span class="ch-old">' +
            (oldExp || 'none') + '</span> → <span class="ch-new">' + exp_date + '</span>');
          h.exp_date = exp_date;
          h.sub_status = new Date(exp_date) > TODAY ? 'Active' : 'Expired';
          h.last_mb_updated = true;
          h.on_mb_active = true;
          // Clear sent_for_renewal if this renewal confirms the new date
          if (h.sent_for_renewal) {
            h.sent_for_renewal = false;
            h.renewal_sent_date = null;
          }
          recalcTabs(h);
          updated++;
        }
      });

      state.changeLog = changes;
      state.lastUpdated = new Date().toLocaleDateString();
      document.getElementById('footer-date').textContent = state.lastUpdated;
      recordUpload('MB Invoice PDF (Renewal)', buildMBChangeEvents(changes));
      updateBadges();
      saveState();

      const summary = '✅ PDF invoice processed — ' + renewals.length + ' devices found.<br>' +
        '<strong>' + updated + '</strong> expiration dates updated' +
        (unmatched > 0 ? ' &nbsp;·&nbsp; <strong>' + unmatched + '</strong> IMEIs not found in inventory' : '');
      showResult('result-mb-combined', summary, updated > 0 ? 'success' : 'info');
      notify('PDF invoice processed: ' + updated + ' dates updated', updated > 0 ? 'success' : 'info');

    } catch(err) {
      console.error('PDF parse error:', err);
      showResult('result-mb-combined', '❌ Could not read PDF: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// MB DEACTIVATION LIST HANDLER
// ============================================================
function handleMBDeactivationFile(file) {
  if (!file) return;
  showResult('result-mb-combined', 'Processing…', 'info');
  takeSnapshot();
  parseFile(file, (err, rows) => {
    if (err) { showResult('result-mb-combined', '❌ Error: ' + err, 'error'); return; }

    const sample = rows[0] || {};
    const keys = Object.keys(sample);

    // Find IMEI and barcode columns
    const imeiCol    = keys.find(k => /imei/i.test(k));
    const barcodeCol = keys.find(k => /barcode/i.test(k));

    if (!imeiCol && !barcodeCol) {
      showResult('result-mb-combined', '❌ Could not find IMEI or Barcode column.', 'error');
      return;
    }

    // Build lookup maps
    const byIMEI    = {};
    const byBarcode = {};
    state.hotspots.forEach(h => {
      if (h.imei)    byIMEI[h.imei.trim()]       = h;
      if (h.barcode) byBarcode[h.barcode.trim()]  = h;
    });

    let deactivated = 0, skipped = 0, alreadyDeact = 0;
    const events = [];

    rows.forEach(row => {
      let h = null;
      if (imeiCol) {
        const imei = String(row[imeiCol] || '').trim().replace(/\D/g, '');
        if (imei && imei.length >= 14) h = byIMEI[imei];
      }
      if (!h && barcodeCol) {
        const b = String(row[barcodeCol] || '').trim();
        if (b) h = byBarcode[b];
      }

      if (!h) { skipped++; return; }

      if (h.sub_status === 'Deactivated') { alreadyDeact++; return; }

      // Mark as deactivated
      h.sub_status    = 'Deactivated';
      h.mb_deactivated = true;
      h.last_mb_updated = true; // include in Alma export
      recalcTabs(h);
      deactivated++;
      events.push({
        type: 'deactivated_mb',
        copy_num: h.copy_num,
        barcode: h.barcode || '',
        device_type: h.device_type,
        library: h.library,
        desc: 'Deactivated by MB Deactivation Report',
        detail: '',
      });
    });

    if (events.length) {
      recordUpload('MB Deactivation Report', events);
      saveState();
    }
    updateBadges();

    showResult('result-mb-combined',
      `✅ MB Deactivation Report processed — <strong>${deactivated}</strong> hotspot${deactivated!==1?'s':''} marked Deactivated and moved to Archive.` +
      (alreadyDeact ? ` ${alreadyDeact} were already deactivated.` : '') +
      (skipped ? ` ${skipped} rows could not be matched.` : ''),
      deactivated > 0 ? 'success' : 'info'
    );
    notify(`MB Deactivation: ${deactivated} hotspots archived`, deactivated > 0 ? 'info' : 'success');
  });
}

// ============================================================
// ALMA BULK UPDATE REPORT GENERATOR
// ============================================================
function generateAlmaReport() {
  const pending = state.hotspots.filter(h => h.last_mb_updated);
  if (!pending.length) {
    notify('No pending Alma updates — upload a Mobile Beacon file first', 'error');
    return;
  }

  loadSheetJS(() => {
    // Format date as M/D/YY
    function fmtExp(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(-2);
      } catch { return dateStr; }
    }

    // Build description: keep "c. X" prefix, update exp date and status suffix
    function buildDesc(h) {
      const base = h.description || '';
      const prefix = base.match(/^[Cc]\.?\s*\d+/)?.[0] || ('c. ' + h.copy_num);
      const isDeact = h.mb_deactivated || h.sub_status === 'Deactivated' || h.sub_status === 'Blocked';
      const isExp   = h.sub_status === 'Expired';
      if (isDeact) {
        const expPart = h.exp_date ? ' exp ' + fmtExp(h.exp_date) : '';
        return prefix + expPart + ' (Deactivated)';
      }
      if (isExp) {
        return prefix + ' exp ' + fmtExp(h.exp_date) + ' (Expired)';
      }
      return prefix + ' exp ' + fmtExp(h.exp_date);
    }

    const rows = pending.map(h => ({
      barcode:         h.barcode || '',
      internal_note_1: h.imei   || '',
      internal_note_2: h.phone  || '',
      internal_note_3: (h.mb_deactivated || h.sub_status === 'Deactivated' || h.sub_status === 'Blocked') ? 'Deactivated' :
                       h.sub_status === 'Expired' ? fmtExp(h.exp_date) + ' (Expired)' : fmtExp(h.exp_date),
      description:     buildDesc(h),
    }));

    const ws   = XLSX.utils.json_to_sheet(rows);
    const wb   = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Alma Update');

    // Auto-size columns
    const colWidths = [20, 20, 18, 16, 36];
    ws['!cols'] = colWidths.map(w => ({ wch: w }));

    const _t = new Date(); const today = _t.getFullYear()+'-'+String(_t.getMonth()+1).padStart(2,'0')+'-'+String(_t.getDate()).padStart(2,'0');
    XLSX.writeFile(wb, 'alma_bulk_update_' + today + '.xlsx');

    // Clear the last_mb_updated flags after export
    pending.forEach(h => { h.last_mb_updated = false; });
    saveState();
    updateBadges();
    if (state.page === 'upload') renderUpload();

    notify('Alma report generated — ' + rows.length + ' records exported', 'success');
  });
}

// ============================================================
// FILE PARSING (CSV and XLSX via SheetJS)
// ============================================================
function loadSheetJS(cb) {
  if (window.XLSX) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = cb;
  document.head.appendChild(s);
}

function parseFile(file, cb) {
  loadSheetJS(() => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        cb(null, rows);
      } catch(err) { cb(err.message); }
    };
    reader.readAsBinaryString(file);
  });
}

function showResult(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'block';
  el.className = 'upload-result ' + type;
  el.innerHTML = msg;
}

// ============================================================
// LIS UPLOAD HANDLER
// ============================================================
function extractIMEI(icn) {
  if (!icn) return '';
  let m = String(icn).match(/IMEI\s*[:\s]*(\d{15})/i);
  if (m) return m[1];
  m = String(icn).match(/\b(\d{15})\b/);
  return m ? m[1] : '';
}
function extractPhone(icn) {
  if (!icn) return '';
  const m = String(icn).match(/ph#\s*\(?(\d{3})\)?[\s\-]?(\d{3})[\s\-]?(\d{4})/);
  return m ? `(${m[1]}) ${m[2]}-${m[3]}` : '';
}
function extractCopyNum(desc) {
  const m = String(desc||'').match(/[Cc]\.\s*(\d+)/);
  return m ? parseInt(m[1]) : null;
}
function extractExpDate(desc) {
  const m = String(desc||'').match(/exp\s+(\d{1,2})[/](\d{1,2})[/](\d{2,4})/);
  if (!m) return '';
  let [, mo, da, yr] = m;
  if (yr.length === 2) yr = '20' + yr;
  // Build ISO string directly — avoid UTC shift from new Date()
  return `${yr}-${mo.padStart(2,'0')}-${da.padStart(2,'0')}`;
}
function getSubStatus(desc) {
  const d = String(desc||'');
  if (/deactivated/i.test(d)) return 'Deactivated';
  if (/blocked/i.test(d)) return 'Blocked';
  const exp = extractExpDate(d);
  if (exp && new Date(exp) < TODAY) return 'Expired';
  if (exp) return 'Active';
  return 'Unknown';
}
function getDeviceType(icn, cn) {
  const s = String(icn||'')+String(cn||'');
  if (/T10/i.test(s)) return 'T10';
  if (/T9/i.test(s)) return 'T9';
  return 'Unknown';
}
function getProgram(cn) {
  if (/AGHS/i.test(String(cn||''))) return 'AGHS';
  if (/DSPS/i.test(String(cn||''))) return 'DSPS';
  return '';
}
function normDueDate(raw) {
  if (!raw || String(raw).toLowerCase() === 'in place') return '';
  const s = String(raw).trim();
  // Already ISO format
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.split('T')[0];
  try {
    const d = new Date(s);
    if (isNaN(d)) return '';
    // Use local date parts to avoid UTC shift
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  } catch { return ''; }
}

function handleLISFile(file) {
  if (!file) return;
  if (!confirm('⚠️ Important Reminder\n\nPlease make sure you have removed any EOPS/CaFE Hotspots from this file before uploading.\n\nContinue with upload?')) return;
  showResult('result-lis', 'Processing…', 'info');
  takeSnapshot(); // snapshot before processing
  parseFile(file, (err, rows) => {
    if (err) { showResult('result-lis', '❌ Error: ' + err, 'error'); return; }

    const COL_MAP = {
      barcode: ['Barcode','barcode','BARCODE'],
      icn: ['Item Call Number','item call number','ItemCallNumber'],
      status: ['Status','status'],
      callnum: ['Call Number','call number','CallNumber'],
      desc: ['Description','description','DESCRIPTION'],
      due: ['Due Date','due date','DueDate'],
      proc: ['Process type','Process Type','process type','ProcessType'],
      library: ['Library','library'],
    };
    function findCol(row, keys) {
      for (const k of keys) if (k in row) return k;
      return null;
    }
    const sample = rows[0] || {};
    const cols = {};
    for (const [field, keys] of Object.entries(COL_MAP)) cols[field] = findCol(sample, keys);

    if (!cols.barcode) { showResult('result-lis', '❌ Could not find Barcode column. Check your file format.', 'error'); return; }

    const changes = [];
    const barcodeMap = {};
    state.hotspots.forEach(h => { barcodeMap[h.barcode] = h; });

    let updated = 0, added = 0, flagged = [];

    rows.forEach(row => {
      const barcode = String(row[cols.barcode]||'').trim();
      if (!barcode) return;

      const desc = String(row[cols.desc]||'').trim();
      const proc = String(row[cols.proc]||'').trim();
      const stat = String(row[cols.status]||'').trim();
      const due = normDueDate(row[cols.due]);
      const icn = String(row[cols.icn]||'').trim();
      const cn = String(row[cols.callnum]||'').trim();
      const lib = String(row[cols.library]||'').trim();

      const existing = barcodeMap[barcode];
      if (existing) {
        const oldProc = existing.process_type;
        const oldStat = existing.lis_status;
        const oldDue = existing.due_date;
        const oldSub = existing.sub_status;

        let changed = false;
        if (proc !== oldProc) { changes.push(`c.${existing.copy_num} <span class="ch-old">${oldProc||'(blank)'}</span> → <span class="ch-new">${proc||'(blank)'}</span> [process]`); changed = true; }
        if (stat !== oldStat) { changes.push(`c.${existing.copy_num} <span class="ch-old">${oldStat}</span> → <span class="ch-new">${stat}</span> [LIS status]`); changed = true; }
        if (due !== oldDue) { changes.push(`c.${existing.copy_num} due <span class="ch-old">${oldDue||'none'}</span> → <span class="ch-new">${due||'none'}</span>`); changed = true; }
        
        // LIS uploads ONLY update: process_type, lis_status, due_date, library, description
        // NEVER update sub_status or exp_date from LIS — those come from Mobile Beacon only
        if (changed) {
          // Do NOT let Alma overwrite a process_type that we auto-set to 'Lost'.
          // If this device was auto-converted (90+ days overdue) we keep 'Lost'
          // even if Alma still says 'Loan' — Alma doesn't know about our auto-convert.
          const isAutoLost = existing.process_type === 'Lost' &&
            existing.is_overdue && existing.days_overdue >= 90 &&
            proc.toLowerCase() === 'loan';
          if (!isAutoLost) {
            existing.process_type = proc;
          }
          existing.lis_status   = stat;
          existing.due_date     = due;
          existing.description  = desc;
          existing.library      = lib || existing.library;
          // Derive sub_status from exp_date if it exists (never from LIS description)
          if (existing.exp_date && !existing.sub_status.match(/Deactivated|Blocked/)) {
            const expDt = new Date(existing.exp_date);
            if (!isNaN(expDt)) {
              existing.sub_status = expDt < TODAY ? 'Expired' : 'Active';
            }
          }
          recalcTabs(existing);
          updated++;
        }

        // Check for archived items returned to library.
        // Only flag if the snapshot ALSO had them archived (wasArchived in snapshot tabs)
        // AND they are now on in_stock — this prevents re-firing on every upload.
        const snapH = _preUploadSnapshot ? _preUploadSnapshot.find(s => s.barcode === existing.barcode) : null;
        const snapWasArchived = snapH && (snapH.tabs || []).includes('archived');
        const nowInStock = (existing.tabs || []).includes('in_stock');
        if (snapWasArchived && nowInStock && !existing.tabs.includes('archived')) {
          flagged.push(`⟳ c.${existing.copy_num} — archived item returned to library!`);
          existing.in_archive = false; // clear so it won't re-fire next upload
        }
      } else {
        // New device not in our system
        const newH = {
          barcode, imei: extractIMEI(icn), imei_verified: true,
          copy_num: extractCopyNum(desc), phone: extractPhone(icn),
          device_type: getDeviceType(icn, cn), program: getProgram(cn),
          description: desc, call_number: cn, lis_status: stat,
          process_type: proc, due_date: due, sub_status: 'Unknown',
          exp_date: '', is_overdue: false, days_overdue: 0,
          in_archive: false, library: lib, tabs: [],
        };
        recalcTabs(newH);
        state.hotspots.push(newH);
        barcodeMap[barcode] = newH;
        changes.push(`<span class="ch-new">NEW</span> c.${newH.copy_num} — ${barcode}`);
        added++;
      }
    });

    state.changeLog = [...flagged, ...changes];
    state.lastUpdated = new Date().toLocaleDateString();
    document.getElementById('footer-date').textContent = state.lastUpdated;
    recordUpload('LIS Inventory Report', buildLISChangeEvents(state.hotspots, barcodeMap, flagged, changes, updated, added));
    updateBadges();

    const summary = `✅ Processed ${rows.length} rows — ${updated} updated, ${added} new devices added, ${changes.length} field changes detected.${flagged.length ? '<br>⚡ ' + flagged.join('<br>') : ''}`;
    showResult('result-lis', summary, 'success');
    saveState();
    notify(`LIS upload complete: ${updated} updated, ${added} new`, 'success');
  });
}

// ============================================================
// MOBILE BEACON UPLOAD HANDLER
// ============================================================
function handleMBFile(file, resultTarget) {
  if (!file) return;
  const mbResultId = resultTarget === 'combined' ? 'result-mb-combined' : 'result-mb';
  showResult(mbResultId, 'Processing…', 'info');
  takeSnapshot();
  takeSnapshot();
  parseFile(file, (err, rows) => {
    if (err) { showResult(mbResultId, '❌ Error: ' + err, 'error'); return; }

    // Find IMEI column and plan end date column
    const sample = rows[0] || {};
    const imeiCol = Object.keys(sample).find(k => /imei/i.test(k));
    const dateCol = Object.keys(sample).find(k => /latest.*service.*plan.*end|plan.*end.*date|service.*end/i.test(k));
    const phoneCol = Object.keys(sample).find(k => /phone|msisdn|number/i.test(k));

    if (!imeiCol) { showResult(mbResultId, '❌ Could not find IMEI column.', 'error'); return; }
    if (!dateCol) { showResult(mbResultId, '❌ Could not find "Latest Service Plan End Date" column.', 'error'); return; }

    // Build IMEI → hotspot map
    const imeiMap = {};
    state.hotspots.forEach(h => { if (h.imei) imeiMap[h.imei] = h; });

    let matched = 0, unmatched = 0;
    const changes = [];

    rows.forEach(row => {
      const imei = String(row[imeiCol]||'').trim().replace(/\D/g,'');
      if (!imei || imei.length < 14) return;
      const rawDate = row[dateCol];
      let newExp = '';
      try {
        const d = new Date(rawDate);
        if (!isNaN(d)) newExp = d.toISOString().split('T')[0];
      } catch {}
      if (!newExp) return;

      const h = imeiMap[imei];
      if (h) {
        const oldExp = h.exp_date;
        if (newExp !== oldExp) {
          changes.push(`c.${h.copy_num} (IMEI ${imei}) exp <span class="ch-old">${oldExp||'none'}</span> → <span class="ch-new">${newExp}</span>`);
          h.exp_date = newExp;
          // Update sub_status based on new exp date
          const expDt = new Date(newExp);
          if (/deactivated/i.test(h.description)) h.sub_status = 'Deactivated';
          else if (/blocked/i.test(h.description)) h.sub_status = 'Blocked';
          else h.sub_status = expDt < TODAY ? 'Expired' : 'Active';
          // Update phone if MB has it
          if (phoneCol && row[phoneCol]) {
            const ph = String(row[phoneCol]).trim();
            if (ph && ph !== h.phone) h.phone = ph;
          }
          // If this device was awaiting renewal, the new exp date confirms it's done
          if (h.sent_for_renewal) {
            h.sent_for_renewal = false;
            h.renewal_sent_date = null;
          }
          h.last_mb_updated = true; // flag for Alma export
          recalcTabs(h);
        }
        matched++;
      } else {
        unmatched++;
      }
    });

    state.changeLog = changes;
    state.lastUpdated = new Date().toLocaleDateString();
    document.getElementById('footer-date').textContent = state.lastUpdated;
    recordUpload('Mobile Beacon Report', buildMBChangeEvents(changes));
    updateBadges();

    showResult(mbResultId, `✅ Processed ${rows.length} rows — ${matched} IMEI matches, ${changes.length} expiration dates updated, ${unmatched} unmatched IMEIs.`, 'success');
    saveState();
    notify(`MB upload: ${changes.length} exp dates updated`, 'success');
  });
}

// ============================================================
// NEW DEVICES UPLOAD HANDLER
// ============================================================
function handleNewFile(file) {
  if (!file) return;
  if (!confirm('⚠️ Important Reminder\n\nPlease make sure you have removed any EOPS/CaFE Hotspots from this file before uploading.\n\nContinue with upload?')) return;
  showResult('result-new', 'Processing…', 'info');
  takeSnapshot();
  parseFile(file, (err, rows) => {
    if (err) { showResult('result-new', '❌ Error: ' + err, 'error'); return; }

    const sample = rows[0] || {};
    const barcodeCol = Object.keys(sample).find(k => /barcode/i.test(k));
    if (!barcodeCol) { showResult('result-new', '❌ Could not find Barcode column.', 'error'); return; }

    const existing = new Set(state.hotspots.map(h=>h.barcode));
    let added = 0, skipped = 0;
    const changes = [];

    rows.forEach(row => {
      const barcode = String(row[barcodeCol]||'').trim();
      if (!barcode || existing.has(barcode)) { skipped++; return; }

      const icn = String(row['Item Call Number']||row['ItemCallNumber']||'').trim();
      const cn = String(row['Call Number']||row['CallNumber']||'').trim();
      const desc = String(row['Description']||'').trim();
      const proc = String(row['Process type']||row['ProcessType']||'').trim();
      const stat = String(row['Status']||'').trim();
      const due = normDueDate(row['Due Date']||row['DueDate']||'');
      const lib = String(row['Library']||'').trim();

      const newH = {
        barcode, imei: extractIMEI(icn), imei_verified: true,
        copy_num: extractCopyNum(desc), phone: extractPhone(icn),
        device_type: getDeviceType(icn, cn), program: getProgram(cn),
        description: desc, call_number: cn, lis_status: stat,
        process_type: proc, due_date: due, sub_status: getSubStatus(desc),
        exp_date: extractExpDate(desc), is_overdue: false, days_overdue: 0,
        in_archive: false, library: lib, tabs: [],
      };
      recalcTabs(newH);
      state.hotspots.push(newH);
      existing.add(barcode);
      changes.push(`<span class="ch-new">ADD</span> c.${newH.copy_num} — ${barcode} (${newH.device_type})`);
      added++;
    });

    state.changeLog = changes;
    recordUpload('New Devices', changes.map(c => ({ type: 'new_device', raw: c })));
    updateBadges();
    showResult('result-new', `✅ Added ${added} new devices. ${skipped} skipped (already in system).`, 'success');
    saveState();
    notify(`${added} new devices added`, 'success');
  });
}

// ============================================================
// SENT FOR RENEWAL UPLOAD HANDLER
// ============================================================
function handleRenewalFile(file) {
  if (!file) return;
  if (!confirm('⚠️ Important Reminder\n\nPlease make sure you have removed any EOPS/CaFE Hotspots from this file before uploading.\n\nContinue with upload?')) return;
  showResult('result-renewal', 'Processing…', 'info');
  parseFile(file, (err, rows) => {
    if (err) { showResult('result-renewal', '❌ Error: ' + err, 'error'); return; }

    const sample = rows[0] || {};
    const keys = Object.keys(sample);

    // Find matching columns — barcode, IMEI, or copy number
    const barcodeCol = keys.find(k => /barcode/i.test(k));
    const imeiCol    = keys.find(k => /imei/i.test(k));
    const copyCol    = keys.find(k => /copy|c\.?\s*#|copy\s*num/i.test(k));

    if (!barcodeCol && !imeiCol && !copyCol) {
      showResult('result-renewal', '❌ Could not find Barcode, IMEI, or Copy # column. Check your file.', 'error');
      return;
    }

    // Build lookup maps
    const byBarcode = {};
    const byIMEI    = {};
    const byCopyNum = {};
    state.hotspots.forEach(h => {
      if (h.barcode) byBarcode[h.barcode.trim()] = h;
      if (h.imei)    byIMEI[h.imei.trim()]       = h;
      if (h.copy_num !== null && h.copy_num !== undefined)
        byCopyNum[String(h.copy_num).trim()]      = h;
    });

    const _t = new Date(); const today = _t.getFullYear()+'-'+String(_t.getMonth()+1).padStart(2,'0')+'-'+String(_t.getDate()).padStart(2,'0');
    let matched = 0, notFound = 0;
    const events = [];

    rows.forEach(row => {
      let h = null;

      if (barcodeCol) {
        const b = String(row[barcodeCol]||'').trim();
        if (b) h = byBarcode[b];
      }
      if (!h && imeiCol) {
        const imei = String(row[imeiCol]||'').trim().replace(/\D/g,'');
        if (imei) h = byIMEI[imei];
      }
      if (!h && copyCol) {
        const cn = String(row[copyCol]||'').trim().replace(/^c\.?\s*/i,'');
        if (cn) h = byCopyNum[cn];
      }

      if (h) {
        h.sent_for_renewal = true;
        h.renewal_sent_date = today;
        matched++;
        events.push({
          type: 'sent_for_renewal',
          copy_num: h.copy_num,
          barcode: h.barcode || '',
          device_type: h.device_type,
          library: h.library,
          desc: 'Sent to Mobile Beacon for renewal',
          detail: `Exp: ${h.exp_date || '—'}`
        });
      } else {
        notFound++;
      }
    });

    if (matched) {
      recordUpload('Sent for Renewal List', events);
      saveState();
      updateBadges();
    }

    showResult('result-renewal',
      `✅ ${matched} device${matched!==1?'s':''} marked as Sent for Renewal.${notFound ? ' ' + notFound + ' rows could not be matched.' : ''}`,
      matched ? 'success' : 'error'
    );
    notify(`${matched} devices marked Sent for Renewal`, 'success');
  });
}

function clearRenewalList() {
  const count = state.hotspots.filter(h => h.sent_for_renewal).length;
  if (!count) { notify('No devices currently marked Sent for Renewal', 'info'); return; }
  if (!confirm(`Clear all ${count} devices from the Sent for Renewal list?\n\nThis does not affect their other statuses — it just removes the renewal-pending flag.`)) return;
  state.hotspots.forEach(h => {
    if (h.sent_for_renewal) {
      h.sent_for_renewal = false;
      h.renewal_sent_date = null;
    }
  });
  saveState();
  updateBadges();
  notify(`Cleared ${count} devices from Sent for Renewal`, 'success');
  if (state.page === 'upload') renderUpload();
}

// ============================================================
// MOBILE BEACON ACTIVE LIST HANDLER (full reconciliation)
// ============================================================
function handleMBActiveFile(file, resultTarget) {
  if (!file) return;
  const mbResultId = resultTarget === 'combined' ? 'result-mb-combined' : 'result-mb-active';
  showResult(mbResultId, 'Processing…', 'info');

  // Confirm before proceeding — this is a destructive reconciliation
  if (!confirm('⚠️ This will mark ALL hotspots whose IMEI is not found in this list as DEACTIVATED and move them to the Archive.\n\nThis action will update ' + state.hotspots.length + ' device records.\n\nAre you sure you want to proceed?')) {
    showResult(mbResultId, 'Cancelled.', 'info');
    return;
  }

  takeSnapshot();
  parseFile(file, (err, rows) => {
    if (err) { showResult(mbResultId, '❌ Error: ' + err, 'error'); return; }

    const sample = rows[0] || {};

    // Find IMEI column
    const imeiCol = Object.keys(sample).find(k => /imei/i.test(k));
    if (!imeiCol) { showResult(mbResultId, '❌ Could not find IMEI column in this file.', 'error'); return; }

    // Find optional columns
    const dateCol = Object.keys(sample).find(k => /latest.*service.*plan.*end|plan.*end.*date|service.*end/i.test(k));
    const phoneCol = Object.keys(sample).find(k => /phone|msisdn|number/i.test(k));

    // Build set of active IMEIs from MB list
    const activeIMEIs = new Set();
    rows.forEach(row => {
      const imei = String(row[imeiCol] || '').trim().replace(/\D/g, '');
      if (imei && imei.length >= 14) activeIMEIs.add(imei);
    });

    if (!activeIMEIs.size) {
      showResult(mbResultId, '❌ No valid IMEIs found in this file. Check the IMEI column.', 'error');
      return;
    }

    const changes = [];
    let deactivated = 0, updated = 0, skipped = 0;

    // Build IMEI → row map for exp date / phone updates
    const mbRowByIMEI = {};
    rows.forEach(row => {
      const imei = String(row[imeiCol] || '').trim().replace(/\D/g, '');
      if (imei && imei.length >= 14) mbRowByIMEI[imei] = row;
    });

    state.hotspots.forEach(h => {
      if (!h.imei) { skipped++; return; }

      const imei = String(h.imei).trim();

      if (activeIMEIs.has(imei)) {
        // Device IS on MB active list — update exp date and phone if available
        const mbRow = mbRowByIMEI[imei];
        let changed = false;

        if (dateCol && mbRow) {
          let newExp = '';
          try {
            const raw = String(mbRow[dateCol]);
            // Try YYYY-MM-DD first
            if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
              newExp = raw.split('T')[0];
            } else {
              // Parse and convert to local date string to avoid UTC shift
              const d = new Date(raw);
              if (!isNaN(d)) {
                newExp = d.getFullYear() + '-' +
                  String(d.getMonth()+1).padStart(2,'0') + '-' +
                  String(d.getDate()).padStart(2,'0');
              }
            }
          } catch {}
          if (newExp && newExp !== h.exp_date) {
            changes.push(`c.${h.copy_num} exp updated: <span class="ch-old">${h.exp_date || 'none'}</span> → <span class="ch-new">${newExp}</span>`);
            h.exp_date = newExp;
            changed = true;
          }
        }

        if (phoneCol && mbRow && mbRow[phoneCol]) {
          const ph = String(mbRow[phoneCol]).trim();
          if (ph && ph !== h.phone) { h.phone = ph; changed = true; }
        }

        // If it was previously MB-deactivated, clear that flag
        if (h.mb_deactivated) {
          h.mb_deactivated = false;
          // Restore sub_status from description
          h.sub_status = getSubStatus(h.description);
          changes.push(`c.${h.copy_num} — <span class="ch-new">RESTORED</span> (now found on MB active list)`);
          changed = true;
        } else if (changed) {
          // Re-derive sub_status in case exp date changed
          if (!/deactivated|blocked/i.test(h.description)) {
            h.sub_status = getSubStatus(h.description.replace(/exp [\d/]+/, 'exp ' + (h.exp_date || '')));
            if (h.exp_date) {
              const expDt = new Date(h.exp_date);
              h.sub_status = expDt < TODAY ? 'Expired' : 'Active';
            }
          }
        }

        if (changed) { recalcTabs(h); updated++; }

      } else {
        // Device is NOT on MB active list — mark as deactivated
        // Only flag if not already deactivated/blocked
        if (h.sub_status !== 'Deactivated' && h.sub_status !== 'Blocked') {
          changes.push(`c.${h.copy_num} (IMEI ${imei}) — <span class="ch-old">${h.sub_status}</span> → <span class="ch-new">Deactivated (not on MB active list)</span>`);
          h.sub_status = 'Deactivated';
          h.mb_deactivated = true;
          h.last_mb_updated = true; // flag for Alma export
          recalcTabs(h);
          deactivated++;
        }
      }
    });

    state.changeLog = changes;
    state.lastUpdated = new Date().toLocaleDateString();
    document.getElementById('footer-date').textContent = state.lastUpdated;
    recordUpload('MB Active List (Reconciliation)', buildMBAChangeEvents(changes, deactivated, updated));
    updateBadges();

    const summary = `✅ MB Active List processed — ${activeIMEIs.size} active IMEIs found.<br>
      <strong>${deactivated}</strong> hotspots marked Deactivated (not on MB list) &nbsp;·&nbsp;
      <strong>${updated}</strong> records updated (exp date / phone) &nbsp;·&nbsp;
      <strong>${skipped}</strong> skipped (no IMEI on record)`;
    showResult(mbResultId, summary, deactivated > 0 ? 'info' : 'success');
    saveState();
    notify(`MB reconciliation complete: ${deactivated} deactivated, ${updated} updated`, deactivated > 0 ? 'info' : 'success');
  });
}

// ============================================================
// RECENT CHANGES — EVENT BUILDERS & RECORD
// ============================================================

// Snapshot a hotspot's key fields for diffing
function snapHotspot(h) {
  return {
    barcode: h.barcode, copy_num: h.copy_num, device_type: h.device_type,
    library: h.library, process_type: h.process_type, lis_status: h.lis_status,
    due_date: h.due_date, sub_status: h.sub_status, exp_date: h.exp_date,
    tabs: [...(h.tabs||[])],
  };
}

// Full deep-copy snapshot of ALL hotspots before any upload
let _preUploadSnapshot = null;
function takeSnapshot() {
  // Only snapshot if data has been fully loaded (prevents race condition on first load)
  if (!state.dataLoaded) {
    _preUploadSnapshot = null;
    return;
  }
  _preUploadSnapshot = JSON.parse(JSON.stringify(state.hotspots));
}

// Build structured events from LIS diff
function buildLISChangeEvents(hotspots, barcodeMap, flagged, rawChanges, updated, added) {
  const events = [];

  if (!_preUploadSnapshot || !Array.isArray(_preUploadSnapshot) || _preUploadSnapshot.length === 0) {
    return events;
  }

  const prev = {};
  _preUploadSnapshot.forEach(h => { prev[h.barcode] = h; });

  hotspots.forEach(h => {
    const old = prev[h.barcode];
    if (!old) return; // genuinely new devices handled by New Devices upload handler

    // Use TAB membership as ground truth — not raw process_type strings.
    // process_type can be briefly wrong mid-upload (auto-Lost devices that Alma
    // still records as Loan). Tabs are set by recalcTabs AFTER all processing.
    const oldTabs = old.tabs || [];
    const newTabs = h.tabs || [];

    const wasOnLoan   = oldTabs.includes('active_loans');
    const isOnLoan    = newTabs.includes('active_loans');
    const wasOverdue  = oldTabs.includes('overdue');
    const isOverdue   = newTabs.includes('overdue');
    const wasLost     = oldTabs.includes('lost_missing');
    const isLost      = newTabs.includes('lost_missing');
    const wasInStock  = oldTabs.includes('in_stock');
    const isInStock   = newTabs.includes('in_stock');
    const wasArchived = oldTabs.includes('archived');
    const isArchived  = newTabs.includes('archived');

    // Checked out: moved onto active_loans from elsewhere
    if (!wasOnLoan && !wasOverdue && !wasLost && isOnLoan) {
      events.push({ type: 'checked_out',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Checked out',
        detail: 'Due: ' + (h.due_date || '\u2014') });
    }

    // Returned: was on loan or overdue, now in stock
    if ((wasOnLoan || wasOverdue) && isInStock && !wasInStock) {
      const note = (h.sub_status === 'Deactivated' || h.sub_status === 'Blocked')
        ? ' \u2014 needs reactivation' : h.sub_status === 'Expired' ? ' \u2014 sub expired' : '';
      events.push({ type: 'returned',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Returned to library' + note,
        detail: 'Was due: ' + (old.due_date || '\u2014') });
    }

    // Recovered from lost/missing: genuinely off lost_missing AND back in stock or on loan
    if (wasLost && !isLost && (isInStock || isOnLoan)) {
      events.push({ type: 'returned',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Recovered from ' + (old.process_type || 'Lost/Missing'),
        detail: isInStock ? 'Now in stock' : 'Now on active loan' });
    }

    // Became overdue (and wasn't already lost)
    if (!wasOverdue && !wasLost && isOverdue) {
      events.push({ type: 'status_change',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Became overdue',
        detail: h.days_overdue + 'd past due (' + (h.due_date || '\u2014') + ')' });
    }

    // Due date changed on an active loan
    if (old.due_date && h.due_date && old.due_date !== h.due_date && isOnLoan) {
      events.push({ type: 'status_change',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Due date updated',
        detail: old.due_date + ' \u2192 ' + h.due_date });
    }

    // Newly on lost/missing (and wasn't already archived)
    if (!wasLost && isLost && !wasArchived) {
      events.push({ type: 'status_change',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Marked ' + (h.process_type || 'Lost/Missing'),
        detail: 'Was: ' + (old.process_type || 'In Stock') });
    }

    // Moved to archive
    if (!wasArchived && isArchived) {
      const reason = h.sub_status === 'Deactivated' ? 'Deactivated' :
                     h.sub_status === 'Blocked'      ? 'Blocked' :
                     h.days_overdue >= 90             ? h.days_overdue + 'd overdue' :
                     'Subscription expired';
      events.push({ type: 'archived',
        copy_num: h.copy_num, barcode: h.barcode || '',
        device_type: h.device_type, library: h.library,
        desc: 'Moved to Archive', detail: reason });
    }

    // LIS location status changed (only if not already covered above)
    if (old.lis_status && h.lis_status && old.lis_status !== h.lis_status) {
      const alreadyCovered = events.some(e => e.barcode === h.barcode);
      if (!alreadyCovered) {
        events.push({ type: 'status_change',
          copy_num: h.copy_num, barcode: h.barcode || '',
          device_type: h.device_type, library: h.library,
          desc: 'Location status changed',
          detail: old.lis_status + ' \u2192 ' + h.lis_status });
      }
    }
  });

  flagged.forEach(f => {
    events.push({ type: 'returned', copy_num: null, device_type: '', library: '',
      desc: f.replace(/<[^>]+>/g, ''), detail: 'Previously archived' });
  });

  return events;
}

function buildMBChangeEvents(rawChanges) {
  return rawChanges.map(raw => {
    const clean = raw.replace(/<[^>]+>/g, '');
    // Parse: "c.X (IMEI Y) exp OLD → NEW"
    const m = clean.match(/c\.(\S+)\s+\(IMEI (\d+)\) exp (.+?) → (.+)/);
    if (m) {
      const h = state.hotspots.find(x => String(x.copy_num) === m[1]);
      return { type: 'renewed', copy_num: parseInt(m[1])||null,
        device_type: h ? h.device_type : '', library: h ? h.library : '',
        desc: 'Expiration date updated',
        detail: `${m[3].trim()} → ${m[4].trim()}` };
    }
    return { type: 'renewed', copy_num: null, device_type: '', library: '',
      desc: clean, detail: '' };
  });
}

function buildMBAChangeEvents(rawChanges, deactivated, updated) {
  const events = [];
  rawChanges.forEach(raw => {
    const clean = raw.replace(/<[^>]+>/g, '');
    if (clean.includes('RESTORED')) {
      const m = clean.match(/c\.(\d+)/);
      const cn = m ? parseInt(m[1]) : null;
      const h = state.hotspots.find(x => x.copy_num === cn);
      events.push({ type: 'restored', copy_num: cn, barcode: h ? (h.barcode||'') : '', device_type: h?h.device_type:'', library: h?h.library:'',
        desc: 'Restored — now on MB active list', detail: '' });
    } else if (clean.includes('not on MB active list')) {
      const m = clean.match(/c\.(\d+)/);
      const cn = m ? parseInt(m[1]) : null;
      const h = state.hotspots.find(x => x.copy_num === cn);
      events.push({ type: 'deactivated_mb', copy_num: cn, barcode: h ? (h.barcode||'') : '', device_type: h?h.device_type:'', library: h?h.library:'',
        desc: 'Deactivated — not on MB active list', detail: '' });
    } else if (clean.includes('exp updated')) {
      const m = clean.match(/c\.(\d+).+exp updated:\s*(.+?)\s*→\s*(.+)/);
      if (m) {
        const cn = parseInt(m[1]);
        const h = state.hotspots.find(x => x.copy_num === cn);
        events.push({ type: 'renewed', copy_num: cn, barcode: h ? (h.barcode||'') : '', device_type: h?h.device_type:'', library: h?h.library:'',
          desc: 'Expiration date updated', detail: `${m[2].trim()} → ${m[3].trim()}` });
      }
    }
  });
  return events;
}

// Record a completed upload into history
function recordUpload(source, events) {
  if (!events || !events.length) return;
  const prof = state.profiles.find(p => p.id === state.activeProfileId);
  const record = {
    id: Date.now(),
    source,
    date: new Date().toLocaleString(),
    events,
    profileId: state.activeProfileId,
    profileName: prof ? prof.name : 'Unknown',
    profileColor: prof ? prof.color : '#4f8ef7',
    collapsed: false,
    sectionState: {},
    snapshot: _preUploadSnapshot, // full state before this upload — used for undo
  };
  state.changeHistory.unshift(record);
  if (state.changeHistory.length > 20) state.changeHistory = state.changeHistory.slice(0, 20);

  // Count events by type for upload history summary
  const typeCounts = {};
  events.forEach(e => { typeCounts[e.type] = (typeCounts[e.type]||0)+1; });
  const histEntry = {
    id: record.id,
    date: record.date,
    source,
    profileId: state.activeProfileId,
    profileName: record.profileName,
    profileColor: record.profileColor,
    typeCounts,
    totalEvents: events.length,
  };
  state.uploadHistory.unshift(histEntry);
  if (state.uploadHistory.length > 50) state.uploadHistory = state.uploadHistory.slice(0, 50);

  // Increment profile upload count
  if (prof) { prof.uploadsCount = (prof.uploadsCount||0) + 1; }

  updateBadges();
}

function undoUpload(id) {
  const idx = state.changeHistory.findIndex(r => r.id === id);
  if (idx === -1) { notify('Upload record not found', 'error'); return; }
  const record = state.changeHistory[idx];

  if (!record.snapshot) {
    notify('No snapshot available for this upload — cannot undo', 'error');
    return;
  }

  const uploadNum = state.changeHistory.length - idx;
  if (!confirm(`↩ Undo Upload #${uploadNum} (${record.source})\n\nThis will restore all hotspot data to how it looked before this upload was processed.\n\nAll uploads AFTER this one will also be removed from history.\n\nAre you sure?`)) return;

  // Restore the hotspot data from the snapshot
  state.hotspots = JSON.parse(JSON.stringify(record.snapshot));

  // Remove this upload and all newer ones from both history arrays
  state.changeHistory = state.changeHistory.slice(idx + 1);
  state.uploadHistory = state.uploadHistory.filter(h => h.id !== id && !state.changeHistory.every(r => r.id !== h.id));
  // Simpler: just remove uploads that came at or after this record's timestamp
  state.uploadHistory = state.uploadHistory.filter(h => h.id < id);

  // Update upload counts on profiles
  state.profiles.forEach(p => {
    p.uploadsCount = state.uploadHistory.filter(h => h.profileId === p.id).length;
  });

  state.lastUpdated = new Date().toLocaleDateString();
  document.getElementById('footer-date').textContent = state.lastUpdated;
  saveState();
  updateBadges();
  notify(`↩ Undone: Upload #${uploadNum} (${record.source}) has been reversed`, 'success');
  renderChanges();
}

        ${hasSnapshot ? `<button class="export-btn" style="font-size:10px;padding:3px 9px;color:var(--yellow);border-color:var(--yellow);flex-shrink:0" onclick="event.stopPropagation();undoUpload(${record.id})">↩ Undo</button>` : ''}

        const rcBarcode = ev.barcode || '';
        html += `<div class="rc-item clickable" ${rcBarcode ? `onclick="showDetail('${ev.barcode}')"` : ''} style="${rcBarcode ? 'cursor:pointer' : ''}">
          <span class="rc-item-copy">${ev.copy_num ? 'c. ' + ev.copy_num : '—'}</span>
          <span class="rc-item-type">${ev.device_type ? '<span class="badge ' + typeClass + '">' + ev.device_type + '</span>' : ''}</span>
          <span class="rc-item-barcode" title="${ev.barcode || ''}">${ev.barcode ? ev.barcode.slice(-8) : '—'}</span>
          <span class="rc-item-desc">${ev.desc}${ev.detail ? ' <span class="reason">— ' + ev.detail + '</span>' : ''}</span>
          <span class="rc-item-lib">${ev.library ? libBadge(ev.library) : ''}</span>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

function toggleRCBlock(idx) {
  state.changeHistory[idx].collapsed = !state.changeHistory[idx].collapsed;
  renderChanges();
}
function toggleRCSection(ri, key) {
  const rec = state.changeHistory[ri];
  rec.sectionState[key] = rec.sectionState[key] !== false ? false : true;
  renderChanges();
}
function exportAllChanges() {
  if (!state.changeHistory.length) { notify('No changes to export', 'error'); return; }
  let csv = 'Upload #,Source,Date,Type,Copy #,Device Type,Library,Description,Detail\n';
  state.changeHistory.forEach((rec, ri) => {
    rec.events.forEach(ev => {
      csv += [state.changeHistory.length-ri, rec.source, rec.date, ev.type,
              ev.copy_num||'', ev.device_type||'', ev.library||'',
              '"'+(ev.desc||'').replace(/"/g,'""')+'"',
              '"'+(ev.detail||'').replace(/"/g,'""')+'"'].join(',') + '\n';
    });
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'hotspot_change_history.csv';
  a.click();
  notify('Change history exported', 'success');
}

    { label: 'Sub Status',   value: h.sub_status || '—' },

      </div>

      <div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;margin:10px 0 6px">Move to / Remove from List</div>

function updateHotspotIMEI(barcode, newIMEI) {
  const h = state.hotspots.find(x => x.barcode === barcode);
  if (!h) return;

  const oldIMEI = h.imei || '';
  if (newIMEI === oldIMEI) {
    notify('IMEI unchanged', 'info');
    return;
  }

  // Check for duplicate IMEI
  const duplicate = state.hotspots.find(x => x.barcode !== barcode && x.imei === newIMEI);
  if (duplicate) {
    if (!confirm(`⚠️ IMEI ${newIMEI} is already assigned to c.${duplicate.copy_num} (${duplicate.barcode}).\n\nAre you sure you want to assign it to c.${h.copy_num} as well?`)) return;
  }

  h.imei = newIMEI;
  h.imei_verified = true;

  saveState();
  updateBadges();
  notify(`✓ IMEI updated for c.${h.copy_num}: ${oldIMEI || '(none)'} → ${newIMEI}`, 'success');

  // Update the input field to reflect the saved value and show verified
  const imeiInput = document.getElementById('override-imei-input');
  if (imeiInput) imeiInput.value = newIMEI;

  // Refresh the detail modal to show the updated IMEI in Device Details
  showDetail(barcode);
}

function applyManualOverride(barcode, action, targetTab) {
  const h = state.hotspots.find(x => x.barcode === barcode);
  if (!h) return;

  const prevTabs = [...h.tabs];
  const prevSentForRenewal = h.sent_for_renewal;

  if (action === 'add' && targetTab) {
    if (!h.tabs.includes(targetTab)) h.tabs.push(targetTab);
    if (targetTab === 'sent_for_renewal') {
      h.sent_for_renewal = true;
      const _tn = new Date(); h.renewal_sent_date = _tn.getFullYear()+'-'+String(_tn.getMonth()+1).padStart(2,'0')+'-'+String(_tn.getDate()).padStart(2,'0');
    }
  } else if (action === 'remove' && targetTab) {
    h.tabs = h.tabs.filter(t => t !== targetTab);
    if (targetTab === 'sent_for_renewal') h.sent_for_renewal = false;
  } else if (action === 'recalc') {
    // Reset to computed state
    recalcTabs(h);
  }

  // Store the override action for AI analysis
  const overrideRecord = {
    id: Date.now(),
    barcode: h.barcode,
    copy_num: h.copy_num,
    action,
    targetTab,
    prevTabs,
    newTabs: [...h.tabs],
    hotspotState: {
      sub_status: h.sub_status,
      process_type: h.process_type,
      lis_status: h.lis_status,
      exp_date: h.exp_date,
      due_date: h.due_date,
      days_overdue: h.days_overdue,
    },
    aiAnalysis: null,
    date: new Date().toLocaleString(),
  };

  if (!state.overrideRules) state.overrideRules = [];
  state.overrideRules.unshift(overrideRecord);
  if (state.overrideRules.length > 50) state.overrideRules = state.overrideRules.slice(0, 50);

  saveState();
  updateBadges();

  // Show result in modal and trigger AI analysis
  const aiDiv = document.getElementById('override-ai-result');
  if (aiDiv) {
    aiDiv.textContent = '⟳ Analyzing your override…';
    aiDiv.style.display = 'block';
  }
  analyzeOverrideWithAI(overrideRecord, h);

  // Re-render the detail modal to reflect new tabs
  showDetail(barcode);
}

async function analyzeOverrideWithAI(record, h) {
  const prompt = `A library staff member manually changed a hotspot's list placement in an inventory tracking system.

Hotspot state when the override was made:
- Sub Status: ${record.hotspotState.sub_status}
- Process Type: ${record.hotspotState.process_type}
- LIS Status: ${record.hotspotState.lis_status}
- Expiration Date: ${record.hotspotState.exp_date || 'none'}
- Due Date: ${record.hotspotState.due_date || 'none'}
- Days Overdue: ${record.hotspotState.days_overdue}

The staff member ${record.action === 'add' ? 'ADDED this hotspot to' : record.action === 'remove' ? 'REMOVED this hotspot from' : 'reset'} the "${record.targetTab}" list.
Previous lists it was on: ${record.prevTabs.join(', ') || 'none'}
New lists it is on: ${record.newTabs.join(', ') || 'none'}

In 1-2 sentences: Why might they have done this, and what rule exception does this suggest? Be specific and concise. Start with "Likely reason:".`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    if (res.ok) {
      const data = await res.json();
      const analysis = data.content?.[0]?.text || 'Could not analyze.';
      record.aiAnalysis = analysis;

      // Update the UI if still on same modal
      const aiDiv = document.getElementById('override-ai-result');
      if (aiDiv) {
        aiDiv.textContent = analysis;
      }
      // Add to override rules list display
      const rulesDiv = document.getElementById('override-rules-list');
      if (rulesDiv) renderOverrideRules(rulesDiv);

      saveState();
    }
  } catch(e) {
    const aiDiv = document.getElementById('override-ai-result');
    if (aiDiv) aiDiv.textContent = 'AI analysis unavailable — override saved.';
  }
}

function renderOverrideRules(container) {
  if (!state.overrideRules || !state.overrideRules.length) {
    container.innerHTML = '<div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace">No manual overrides recorded yet.</div>';
    return;
  }
  container.innerHTML = state.overrideRules.slice(0, 5).map(r =>
    `<div class="override-rule-item">
      c.${r.copy_num} — ${r.action} "${r.targetTab}" — ${r.date}<br>
      ${r.aiAnalysis ? '<span style="color:var(--teal)">' + r.aiAnalysis + '</span>' : '<span style="opacity:0.5">Analyzing…</span>'}
    </div>`
  ).join('');
}

function renderProfileEditForm(p) {
  const isNew = !p;
  const id = p ? p.id : 'new';
  const name = p ? p.name : '';
  const role = p ? (p.role||'') : '';
  const color = p ? p.color : PROFILE_COLORS[state.profiles.length % PROFILE_COLORS.length];
  const colorSwatches = PROFILE_COLORS.map(c =>
    `<div class="pm-color-swatch ${c===color?'selected':''}" style="background:${c}"
      onclick="document.getElementById('pf-color-${id}').value='${c}';
               document.querySelectorAll('.pm-color-swatch').forEach(s=>s.classList.remove('selected'));
               this.classList.add('selected')"></div>`
  ).join('');
  return `<div class="pm-profile-tile">
    <div class="pm-edit-form">
      <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px">${isNew ? 'New Profile' : 'Edit Profile'}</div>
      <input class="pm-input" id="pf-name-${id}" placeholder="Name *" value="${name}" maxlength="24">
      <input class="pm-input" id="pf-role-${id}" placeholder="Role (optional, e.g. Librarian)" value="${role}" maxlength="32">
      <input type="hidden" id="pf-color-${id}" value="${color}">
      <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px">Colour</div>
      <div class="pm-color-row">${colorSwatches}</div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn-primary" style="flex:1;font-size:12px;padding:8px"
          onclick="${isNew ? 'createProfile()' : `saveProfile('${id}')`}">
          ${isNew ? 'Create' : 'Save'}
        </button>
        <button class="pm-tile-btn" style="flex:1" onclick="_editingProfileId=null;renderProfileManager()">Cancel</button>
      </div>
    </div>
  </div>`;
}

function createProfile() {
  const name = (document.getElementById('pf-name-new')||{}).value?.trim();
  if (!name) { notify('Name is required', 'error'); return; }
  const role = (document.getElementById('pf-role-new')||{}).value?.trim();
  const color = (document.getElementById('pf-color-new')||{}).value || PROFILE_COLORS[0];
  const prof = { id: 'prof_' + Date.now(), name, role, color, uploadsCount: 0 };
  state.profiles.push(prof);
  if (!state.activeProfileId) state.activeProfileId = prof.id;
  _editingProfileId = null;
  updateBadges();
  renderProfileManager();
  saveState();
  notify('Profile created: ' + name, 'success');
}

function saveProfile(id) {
  const prof = state.profiles.find(p => p.id === id);
  if (!prof) return;
  const name = (document.getElementById('pf-name-' + id)||{}).value?.trim();
  if (!name) { notify('Name is required', 'error'); return; }
  prof.name = name;
  prof.role = (document.getElementById('pf-role-' + id)||{}).value?.trim();
  prof.color = (document.getElementById('pf-color-' + id)||{}).value || prof.color;
  _editingProfileId = null;
  updateBadges();
  renderProfileManager();
  saveState();
  notify('Profile updated', 'success');
}

function deleteProfile(id) {
  if (!confirm('Delete this profile? Their upload history will remain but be unattributed.')) return;
  state.profiles = state.profiles.filter(p => p.id !== id);
  if (state.activeProfileId === id) state.activeProfileId = state.profiles[0]?.id || null;
  _editingProfileId = null;
  updateBadges();
  renderProfileManager();
  saveState();
  notify('Profile deleted', 'info');
}

// ── Upload History page ──────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('content');
  if (!state.uploadHistory.length) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div><div style="font-size:18px;font-weight:800;color:var(--text)">Upload History</div>
      <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">All uploads by all team members</div></div>
    </div>
    <div class="uh-empty">No uploads recorded yet.</div>`;
    return;
  }

  const TYPE_LABELS = {
    checked_out: 'Checked out', returned: 'Returned', renewed: 'Renewed',
    archived: 'Archived', deactivated_mb: 'Deactivated (MB)', restored: 'Restored (MB)',
    status_change: 'Status changed', new_device: 'New device', sent_for_renewal: 'Sent for renewal',
  };
  const TYPE_COLORS = {
    checked_out: 'var(--accent)', returned: 'var(--green)', renewed: 'var(--yellow)',
    archived: 'var(--orange)', deactivated_mb: 'var(--red)', restored: 'var(--purple)',
    status_change: 'var(--purple)', new_device: 'var(--green)', sent_for_renewal: 'var(--teal)',
  };

  let html = `<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">
    <div>
      <div style="font-size:18px;font-weight:800;color:var(--text)">Upload History</div>
      <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${state.uploadHistory.length} upload${state.uploadHistory.length!==1?'s':''} recorded</div>
    </div>
    <button class="export-btn" style="margin-left:auto" onclick="exportAllChanges()">⬇ Export Changes CSV</button>
  </div>`;

  state.uploadHistory.forEach((h, i) => {
    const color = h.profileColor || '#4f8ef7';
    const initial = (h.profileName||'?').charAt(0).toUpperCase();
    const badges = Object.entries(h.typeCounts).map(([type, count]) =>
      `<span class="badge" style="background:rgba(255,255,255,0.06);color:${TYPE_COLORS[type]||'var(--text2)'};font-size:10px">${count} ${TYPE_LABELS[type]||type}</span>`
    ).join(' ');

    // Find matching change record to check for snapshot
    const chRec = state.changeHistory.find(r => r.id === h.id);
    const hasSnap = chRec && !!chRec.snapshot;
    html += `<div class="uh-item">
      <div class="uh-item-header">
        <div class="uh-avatar" style="background:${color}">${initial}</div>
        <div class="uh-info">
          <div class="uh-title">${h.source}</div>
          <div class="uh-meta">by <strong style="color:var(--text)">${h.profileName}</strong></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;flex:1;justify-content:center;padding:0 12px">${badges}</div>
        <div class="uh-count">${h.totalEvents} change${h.totalEvents!==1?'s':''}</div>
        <div class="uh-date">${h.date}</div>
        ${hasSnap ? `<button class="export-btn" style="font-size:10px;padding:3px 9px;color:var(--yellow);border-color:var(--yellow);flex-shrink:0;margin-left:8px"
          onclick="undoUpload(${h.id});renderHistory()">↩ Undo</button>` : ''}
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

// Password is hashed so it's not visible in plain text in the source

function hashPassword(pw) {
  // Simple deterministic hash for client-side check (not cryptographic)
  let h = 0x811c9dc5;
  for (let i = 0; i < pw.length; i++) {
    h ^= pw.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  // Combine with a secondary pass for more bits
  let h2 = 0;
  for (let i = pw.length - 1; i >= 0; i--) {
    h2 = ((h2 << 5) - h2) + pw.charCodeAt(i);
    h2 |= 0;
  }
  return (h >>> 0).toString(16).padStart(8,'0') + (Math.abs(h2) >>> 0).toString(16).padStart(8,'0');
}

// Store the correct hash at init time

}

// ============================================================
// PERSISTENCE — Supabase shared database
// ============================================================
const SUPABASE_URL = 'https://awvfgdiagcirrwrazzlo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qn2lu5reQeF2xl80QPeGBg_SjSTI2Us';
const STORAGE_KEY  = 'slo_hotspot_db_v1'; // kept as localStorage fallback key

async function saveState() {
  const toSave = {
    hotspots:        state.hotspots,
    profiles:        state.profiles,
    activeProfileId: state.activeProfileId,
    changeHistory:   state.changeHistory,
    uploadHistory:   state.uploadHistory,
    lastUpdated:     state.lastUpdated,
    overrideRules:   state.overrideRules || [],
  };

  // Always write full state (with snapshots) to localStorage for undo support
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave)); } catch(e) {}

  // For Supabase: strip snapshots entirely — each is ~178KB and causes save failures.
  // Snapshots are stored in localStorage only (same machine/browser).
  const changeHistoryCloud = state.changeHistory.map(r => {
    const { snapshot, ...rest } = r;
    return rest;
  });
  const toSaveCloud = { ...toSave, changeHistory: changeHistoryCloud };

  try {
    // Try PATCH first (update existing row)
    const res = await fetch(SUPABASE_URL + '/rest/v1/hotspot_state?id=eq.main', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ data: toSaveCloud }),
    });
    if (!res.ok) {
      const errText = await res.text();
      console.warn('Supabase PATCH failed (' + res.status + '):', errText);
      // Try upsert as fallback in case row doesn't exist
      const res2 = await fetch(SUPABASE_URL + '/rest/v1/hotspot_state', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'resolution=merge-duplicates,return=minimal',
        },
        body: JSON.stringify({ id: 'main', data: toSaveCloud }),
      });
      if (!res2.ok) {
        const err2 = await res2.text();
        console.warn('Supabase upsert also failed (' + res2.status + '):', err2);
        notify('⚠️ Cloud save failed (' + res2.status + ') — check console for details', 'error');
      } else {
        console.log('✓ Saved via upsert fallback');
      }
    }
  } catch(e) {
    console.warn('Supabase unreachable:', e.message);
    notify('⚠️ Cloud save failed — check your internet connection', 'error');
  }
}

async function loadState() {
  // Try Supabase first
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/hotspot_state?id=eq.main&select=data,updated_at', {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      },
    });
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows.length && rows[0].data && rows[0].data.hotspots && rows[0].data.hotspots.length) {
        const saved = rows[0].data;
        state.hotspots        = saved.hotspots;
        state.profiles        = saved.profiles        || [];
        state.activeProfileId = saved.activeProfileId || null;
        state.changeHistory   = saved.changeHistory   || [];
        state.uploadHistory   = saved.uploadHistory   || [];
        state.lastUpdated     = saved.lastUpdated      || state.lastUpdated;
        state.overrideRules   = saved.overrideRules   || [];
        // Snapshots are not stored in Supabase (too large).
        // Restore them from localStorage if available (same browser).
        try {
          const localRaw = localStorage.getItem(STORAGE_KEY);
          if (localRaw) {
            const localSaved = JSON.parse(localRaw);
            if (localSaved.changeHistory) {
              const localSnapMap = {};
              localSaved.changeHistory.forEach(r => {
                if (r.snapshot) localSnapMap[r.id] = r.snapshot;
              });
              state.changeHistory.forEach(r => {
                if (!r.snapshot && localSnapMap[r.id]) r.snapshot = localSnapMap[r.id];
              });
            }
          }
        } catch {}
        // Write Supabase data back to localStorage to keep them in sync
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            hotspots: state.hotspots, profiles: state.profiles,
            activeProfileId: state.activeProfileId,
            changeHistory: state.changeHistory, uploadHistory: state.uploadHistory,
            lastUpdated: state.lastUpdated, overrideRules: state.overrideRules || [],
          }));
        } catch {}
        console.log('✓ Loaded from Supabase (' + saved.hotspots.length + ' devices)');
        return true;
      }
    }
  } catch(e) {
    console.warn('Supabase load failed, trying localStorage:', e.message);
  }

  // Fall back to localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (saved.hotspots && saved.hotspots.length) {
      state.hotspots        = saved.hotspots;
      state.profiles        = saved.profiles        || [];
      state.activeProfileId = saved.activeProfileId || null;
      state.changeHistory   = saved.changeHistory   || [];
      state.uploadHistory   = saved.uploadHistory   || [];
      state.lastUpdated     = saved.lastUpdated      || state.lastUpdated;
      console.log('✓ Loaded from localStorage (offline fallback)');
      return true;
    }
  } catch(e) {
    console.warn('localStorage load failed:', e.message);
  }
  return false;
}

function resetToBaseline() {
  if (!confirm('⚠️ This will erase ALL uploaded data, profiles, and change history, and restore the original baseline inventory.\n\nThis cannot be undone. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  // Also clear Supabase
  fetch(SUPABASE_URL + '/rest/v1/hotspot_state?id=eq.main', {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': 'return=minimal',
    },
    body: JSON.stringify({ data: {}, updated_at: new Date().toISOString() }),
  }).finally(() => location.reload());
}

document.getElementById('pw-overlay').innerHTML += `<div id="db-loading" style="position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">⟳ Connecting to database…</div>`;

(async () => {
  await loadState();
  state.dataLoaded = true; // mark data as ready for snapshotting

  // Recalculate tabs, overdue counts, and expiry status for every hotspot
  // using today's real date. This ensures days-overdue and expired flags
  // are always current, not frozen at the time of the last file upload.
  state.hotspots.forEach(h => recalcTabs(h));

  // Clean up any bad upload records where ALL events are false new_device floods
  state.changeHistory = state.changeHistory.filter(r => {
    if (!r.events || !r.events.length) return false;
    const allNew = r.events.every(e => e.type === 'new_device');
    const isMassFlood = allNew && r.events.length > 50; // more than 50 "new devices" = false positive
    return !isMassFlood;
  });
  state.uploadHistory = state.uploadHistory.filter(h =>
    state.changeHistory.some(r => r.id === h.id) || h.totalEvents <= 50
  );
  // Remove loading indicator
  const el = document.getElementById('db-loading');
  if (el) el.remove();

  document.getElementById('footer-date').textContent = state.lastUpdated;
  showPage('dashboard');
  updateBadges();
  // Focus password field on load
  setTimeout(() => { const inp = document.getElementById('pw-input'); if (inp) inp.focus(); }, 150);
  // Profile selection is triggered by checkPassword() after successful auth
})();
</script>
