<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotspot Inventory System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f42;
    --border2: #363c55;
    --text: #e8eaf2;
    --text2: #8b92b0;
    --text3: #555d7a;
    --accent: #4f8ef7;
    --accent2: #3a6fd4;
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --orange: #fb923c;
    --orange-bg: rgba(251,146,60,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --teal: #2dd4bf;
    --teal-bg: rgba(45,212,191,0.1);
    --blue-bg: rgba(79,142,247,0.1);
    --sidebar-w: 220px;
    --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; overflow: auto; }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w); min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 18px 16px; border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-title {
    font-size: 13px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); line-height: 1.2;
  }
  .sidebar-logo .logo-sub { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-section-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text3); padding: 10px 18px 5px; font-family: 'DM Mono', monospace;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 18px;
    background: none; border: none; color: var(--text2); cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; text-align: left; transition: all 0.15s; border-left: 2px solid transparent;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--blue-bg); color: var(--accent); border-left-color: var(--accent); }
  .nav-btn .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--surface2); color: var(--text2);
    font-size: 10px; font-family: 'DM Mono', monospace; padding: 1px 6px;
    border-radius: 10px; font-weight: 500; border: 1px solid var(--border2);
  }
  .nav-btn.active .nav-badge { background: var(--blue-bg); color: var(--accent); border-color: var(--accent2); }
  .sidebar-footer {
    padding: 14px 18px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; line-height: 1.6;
  }

  /* MAIN */
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: visible; }

  /* TOP BAR */
  #topbar {
    height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0;
    position: sticky; top: 0; z-index: 50;
  }
  #topbar .page-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
  #topbar .topbar-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  #topbar .last-updated { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* PAGE CONTENT */
  #content { flex: 1; overflow-y: visible; padding: 24px; }

  /* DASHBOARD */
  .tab-row {
    display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 5px;
  }
  .tab-btn {
    padding: 7px 14px; border-radius: 7px; border: none; background: none;
    color: var(--text2); cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; transition: all 0.15s; display: flex; align-items: center; gap: 7px;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--surface2); color: var(--text); }
  .tab-btn .tab-count {
    font-size: 10px; font-family: 'DM Mono', monospace; padding: 1px 5px;
    border-radius: 8px; font-weight: 500;
  }
  .tab-btn.tab-green.active { color: var(--green); }
  .tab-btn.tab-green.active .tab-count { background: var(--green-bg); color: var(--green); }
  .tab-btn.tab-blue.active { color: var(--accent); }
  .tab-btn.tab-blue.active .tab-count { background: var(--blue-bg); color: var(--accent); }
  .tab-btn.tab-yellow.active { color: var(--yellow); }
  .tab-btn.tab-yellow.active .tab-count { background: var(--yellow-bg); color: var(--yellow); }
  .tab-btn.tab-red.active { color: var(--red); }
  .tab-btn.tab-red.active .tab-count { background: var(--red-bg); color: var(--red); }
  .tab-btn.tab-orange.active { color: var(--orange); }
  .tab-btn.tab-orange.active .tab-count { background: var(--orange-bg); color: var(--orange); }
  .tab-btn.tab-purple.active { color: var(--purple); }
  .tab-btn.tab-purple.active .tab-count { background: var(--purple-bg); color: var(--purple); }
  .tab-btn.tab-teal.active { color: var(--teal); }
  .tab-btn.tab-teal.active .tab-count { background: var(--teal-bg); color: var(--teal); }

  .section-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 8px; font-family: 'DM Mono', monospace;
  }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface); padding: 10px 14px; text-align: left;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); font-family: 'DM Mono', monospace; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text2); }
  thead th .sort-icon { font-size: 9px; margin-left: 3px; opacity: 0.5; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr.clickable { cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 9px 14px; color: var(--text2); font-family: 'DM Mono', monospace; vertical-align: middle; }
  tbody td.td-main { color: var(--text); font-weight: 500; font-family: 'Syne', sans-serif; font-size: 13px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px;
    font-weight: 600; font-family: 'Syne', sans-serif; white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-blue { background: var(--blue-bg); color: var(--accent); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-orange { background: var(--orange-bg); color: var(--orange); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-gray { background: var(--surface2); color: var(--text2); }

  /* SEARCH + FILTER BAR */
  .toolbar {
    display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .search-input {
    flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border2);
    border-radius: 7px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 7px;
    padding: 8px 12px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px;
    outline: none; cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }
  .export-btn {
    padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text2); font-family: 'Syne', sans-serif; font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .export-btn:hover { background: var(--blue-bg); color: var(--accent); border-color: var(--accent2); }
  .count-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

  /* STATS CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .stat-card .stat-num { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .stat-card .stat-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-card .stat-sub { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }

  /* UPLOAD PAGE */
  .upload-section { margin-bottom: 28px; }
  .upload-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .upload-section p { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; font-family: 'DM Mono', monospace; }
  .upload-drop {
    border: 2px dashed var(--border2); border-radius: 10px; padding: 32px 24px; text-align: center;
    cursor: pointer; transition: all 0.2s; background: var(--surface);
  }
  .upload-drop:hover, .upload-drop.dragover { border-color: var(--accent); background: var(--blue-bg); }
  .upload-drop .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-drop .upload-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .upload-drop .upload-hint { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .upload-drop input[type=file] { display: none; }
  .upload-result {
    margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 12px;
    font-family: 'DM Mono', monospace; line-height: 1.6; display: none;
  }
  .upload-result.success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
  .upload-result.error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .upload-result.info { background: var(--blue-bg); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .btn-primary {
    padding: 9px 18px; background: var(--accent); border: none; border-radius: 7px;
    color: #fff; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); }

  /* TOTAL DEVICES PAGE */
  .total-header { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .total-stat { text-align: center; }
  .total-stat .n { font-size: 32px; font-weight: 800; color: var(--accent); }
  .total-stat .l { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; font-family: 'DM Mono', monospace; }

  /* NOTIFICATION */
  #notification {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px;
    padding: 12px 18px; font-size: 13px; font-family: 'DM Mono', monospace;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 360px;
    transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  #notification.show { transform: translateX(0); }
  #notification.success { border-color: var(--green); color: var(--green); }
  #notification.error { border-color: var(--red); color: var(--red); }
  #notification.info { border-color: var(--accent); color: var(--accent); }

  /* OVERDUE WARNING */
  .overdue-severe { color: var(--red) !important; }
  .overdue-warn { color: var(--orange) !important; }

  /* RESPONSIVE HIDE */
  .hide-sm { display: table-cell; }
  @media (max-width: 900px) { .hide-sm { display: none; } }

  /* ATTENTION PANEL */


  /* RECENT CHANGES PAGE */
  .rc-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .rc-header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
  .rc-header .rc-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .rc-empty { text-align: center; padding: 80px 20px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 13px; }
  .rc-empty .rc-empty-icon { font-size: 48px; margin-bottom: 16px; }

  .rc-upload-block {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 16px; overflow: hidden;
  }
  .rc-upload-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
    background: var(--surface2); transition: background 0.15s;
  }
  .rc-upload-header:hover { background: var(--border); }
  .rc-upload-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .rc-upload-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .rc-upload-source { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--blue-bg); color: var(--accent); font-family: 'Syne', sans-serif; }
  .rc-upload-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .rc-upload-header.collapsed .rc-upload-chevron { transform: rotate(-90deg); }
  .rc-upload-body { padding: 0; }
  .rc-upload-body.hidden { display: none; }

  .rc-section { border-bottom: 1px solid var(--border); }
  .rc-section:last-child { border-bottom: none; }
  .rc-section-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 18px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'DM Mono', monospace; cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .rc-section-header:hover { background: rgba(255,255,255,0.02); }
  .rc-section-count {
    margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 10px;
    font-weight: 500;
  }
  .rc-section-chevron { font-size: 9px; opacity: 0.5; transition: transform 0.15s; }
  .rc-section-header.collapsed .rc-section-chevron { transform: rotate(-90deg); }
  .rc-section-items { }
  .rc-section-items.hidden { display: none; }

  .rc-item {
    display: grid; grid-template-columns: 56px 56px 110px 1fr auto;
    align-items: center; gap: 12px; padding: 8px 18px;
    border-bottom: 1px solid var(--border); font-size: 12px;
    transition: background 0.1s;
  }
  .rc-item:last-child { border-bottom: none; }
  .rc-item:hover { background: rgba(255,255,255,0.02); }
  .rc-item.clickable:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
  .rc-item-copy { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 13px; color: var(--text); }
  .rc-item-type { }
  .rc-item-desc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .rc-item-barcode { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rc-item-desc .old { color: var(--red); text-decoration: line-through; }
  .rc-item-desc .new { color: var(--green); }
  .rc-item-desc .reason { color: var(--orange); font-style: italic; }
  .rc-item-lib { }

  /* section colour theming */
  .rcs-checked-out .rc-section-header { color: var(--accent); border-left: 3px solid var(--accent); }
  .rcs-checked-out .rc-section-count { background: var(--blue-bg); color: var(--accent); }
  .rcs-returned .rc-section-header { color: var(--green); border-left: 3px solid var(--green); }
  .rcs-returned .rc-section-count { background: var(--green-bg); color: var(--green); }
  .rcs-renewed .rc-section-header { color: var(--yellow); border-left: 3px solid var(--yellow); }
  .rcs-renewed .rc-section-count { background: var(--yellow-bg); color: var(--yellow); }
  .rcs-archived .rc-section-header { color: var(--orange); border-left: 3px solid var(--orange); }
  .rcs-archived .rc-section-count { background: var(--orange-bg); color: var(--orange); }
  .rcs-status .rc-section-header { color: var(--purple); border-left: 3px solid var(--purple); }
  .rcs-status .rc-section-count { background: var(--purple-bg); color: var(--purple); }
  .rcs-new .rc-section-header { color: var(--green); border-left: 3px solid var(--green); }
  .rcs-new .rc-section-count { background: var(--green-bg); color: var(--green); }
  .rcs-restored .rc-section-header { color: var(--purple); border-left: 3px solid var(--purple); }
  .rcs-restored .rc-section-count { background: var(--purple-bg); color: var(--purple); }
  .rcs-teal .rc-section-header { color: var(--teal); border-left: 3px solid var(--teal); }
  .rcs-teal .rc-section-count { background: var(--teal-bg); color: var(--teal); }
  .rcs-deactivated .rc-section-header { color: var(--red); border-left: 3px solid var(--red); }
  .rcs-deactivated .rc-section-count { background: var(--red-bg); color: var(--red); }

  /* CHANGES PANEL */
  .changes-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 20px; display: none;
  }
  .changes-panel h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--yellow); }
  .change-item { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text2); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .change-item:last-child { border-bottom: none; }
  .change-item .ch-new { color: var(--green); }
  .change-item .ch-old { color: var(--red); text-decoration: line-through; }

  /* ATTENTION PANEL */
  .attention-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 20px; overflow: hidden;
  }
  .attention-header {
    display: flex; align-items: center; gap: 10px; padding: 13px 18px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    background: var(--surface2);
  }
  .attention-header:hover { background: var(--border); }
  .attention-header h4 { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .attention-header .attn-counts { display: flex; gap: 8px; align-items: center; }
  .attention-header .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
  .attention-header.collapsed .chevron { transform: rotate(-90deg); }
  .attention-body { display: block; }
  .attention-body.hidden { display: none; }

  .attn-tier { border-bottom: 1px solid var(--border); }
  .attn-tier:last-child { border-bottom: none; }
  .attn-tier-header {
    display: flex; align-items: center; gap: 10px; padding: 9px 18px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    font-family: 'DM Mono', monospace; cursor: pointer; user-select: none;
  }
  .attn-tier-header:hover { background: rgba(255,255,255,0.02); }
  .attn-tier-header .tier-chevron { font-size: 9px; margin-left: auto; opacity: 0.5; transition: transform 0.15s; }
  .attn-tier-header.collapsed .tier-chevron { transform: rotate(-90deg); }
  .attn-tier-items { }
  .attn-tier-items.hidden { display: none; }

  .attn-item {
    display: grid; grid-template-columns: 60px 60px 1fr auto auto auto;
    align-items: center; gap: 12px;
    padding: 8px 18px; border-bottom: 1px solid var(--border);
    font-size: 12px; transition: background 0.1s; cursor: default;
  }
  .attn-item:last-child { border-bottom: none; }
  .attn-item:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
  .attn-item .ai-copy { font-weight: 700; font-family: 'Syne', sans-serif; color: var(--text); font-size: 13px; }
  .attn-item .ai-type { }
  .attn-item .ai-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .attn-item .ai-lib { }
  .attn-item .ai-exp { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .attn-item .ai-action { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); white-space: nowrap; }

  .tier-critical .attn-tier-header { color: var(--red); border-left: 3px solid var(--red); }

function getTabData(tabId) {
  if (tabId === 'sent_for_renewal') return state.hotspots.filter(h => h.sent_for_renewal);
  return state.hotspots.filter(h => h.tabs.includes(tabId));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.round((d - TODAY) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  // Parse YYYY-MM-DD without timezone shift by treating as local date
  const parts = String(dateStr).split('T')[0].split('-');
  if (parts.length === 3) {
    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function notify(msg, type = 'info') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 4000);
}

function exportCSV(data, filename) {
  if (!data.length) { notify('No data to export', 'error'); return; }
  const cols = ['copy_num','barcode','imei','phone','device_type','program','library','lis_status','process_type','due_date','exp_date','sub_status','days_overdue'];
  const headers = ['Copy #','Barcode','IMEI','Phone','Type','Program','Library','LIS Status','Process Type','Due Date','Exp Date','Sub Status','Days Overdue'];
  let csv = headers.join(',') + '\n';
  data.forEach(h => {
    csv += cols.map(c => JSON.stringify(h[c] ?? '')).join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename + '.csv';
  a.click();
  notify('Exported ' + data.length + ' records', 'success');
}

// ============================================================
// RECALCULATE TABS (run after data changes)
// ============================================================
function recalcTabs(h) {
  const tabs = new Set();
  const proc  = (h.process_type || '').toLowerCase().trim();
  const stat  = h.lis_status   || '';
  const sub   = h.sub_status   || '';

  // Core flags
  const isDeactBlocked = sub === 'Deactivated' || sub === 'Blocked';
  const isInPlace      = stat === 'Item in place';
  const isOnLoan       = proc === 'loan';
  const isLostProc     = ['lost','missing','lost and paid','claimed returned'].includes(proc);
  const isBlankProc    = proc === '';

  // Derive isExpired purely from exp_date vs today (never from Alma)
  let isExpired = false;
  if (h.exp_date && !isDeactBlocked) {
    try { isExpired = new Date(h.exp_date) < TODAY; } catch {}
  }
  // Keep sub_status in sync
  if (!isDeactBlocked) {
    h.sub_status = isExpired ? 'Expired' : (h.exp_date ? 'Active' : (sub || 'Unknown'));
  }
  const isInactive = isDeactBlocked || isExpired;

  // Overdue (loans only)
  let isOverdue = false, daysOverdue = 0;
  if (h.due_date && isOnLoan) {
    try {
      const dd = new Date(h.due_date);
      if (!isNaN(dd) && dd < TODAY) {
        isOverdue   = true;
        daysOverdue = Math.round((TODAY - dd) / 86400000);
      }
    } catch {}
  }
  h.is_overdue   = isOverdue;
  h.days_overdue = daysOverdue;

  // ── Rule 5: 90+ days overdue → auto-set to Lost ──────────────────────────
  if (isOverdue && daysOverdue >= 90) {
    h.process_type = 'Lost';
    // Re-evaluate with new proc
    // Falls through to lost/missing rules below
    isOverdue   = false; daysOverdue = 0;
    h.is_overdue = false; h.days_overdue = 0;
    // Rule 6: deact/blocked/expired + now lost → archived only
    if (isInactive) {
      tabs.add('archived');
    } else {
      tabs.add('lost_missing');
      tabs.add('to_deactivate');
    }
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rules 7 & 8: Inactive (deact/blocked/expired) but in stock or active loan ──
  // Rule 8: in_place + inactive → In Stock + To Reactivate (NOT archived)
  if (isInPlace && isInactive) {
    tabs.add('in_stock');
    tabs.add('to_be_reactivated');
    h.attention_critical = true;
    h.tabs = Array.from(tabs);
    return h;
  }

  // Rule 7: active loan (not overdue) + inactive → Active Loans + To Reactivate (NOT archived)
  if (isOnLoan && !isOverdue && isInactive) {
    tabs.add('active_loans');
    tabs.add('to_be_reactivated');
    h.attention_critical = true;
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rule 1: In place + active → In Stock ────────────────────────────────
  if (isInPlace) {
    tabs.add('in_stock');
    // Upcoming renewals: in_stock + active + exp within 180d
    if (h.exp_date && !isExpired) {
      try {
        if (Math.round((new Date(h.exp_date) - TODAY) / 86400000) <= 180)
          tabs.add('upcoming_renewals');
      } catch {}
    }
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rule 6: inactive + not in place + not active loan → Archived only ────
  if (isInactive) {
    tabs.add('archived');
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rule 2: Active loan, not overdue, not inactive ───────────────────────
  if (isOnLoan && !isOverdue) {
    tabs.add('active_loans');
    // Upcoming renewals: active_loans + exp within 180d
    if (h.exp_date) {
      try {
        if (Math.round((new Date(h.exp_date) - TODAY) / 86400000) <= 180)
          tabs.add('upcoming_renewals');
      } catch {}
    }
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rule 3: Overdue loan (not inactive, < 90d) → Overdue only ────────────
  if (isOnLoan && isOverdue) {
    tabs.add('overdue');
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Rules 4 & 6: Lost/Missing process ───────────────────────────────────
  if (isLostProc) {
    if (isInactive) {
      tabs.add('archived');
    } else {
      tabs.add('lost_missing');
      tabs.add('to_deactivate');
    }
    h.tabs = Array.from(tabs);
    return h;
  }

  // ── Blank process, not in place, not inactive → nothing (edge case) ──────
  h.tabs = Array.from(tabs);
  return h;
}

// ============================================================
// SORT + FILTER
// ============================================================
function sortFilter(data) {
  let d = data.filter(h => {
    const q = state.search.toLowerCase();
    if (q && !['copy_num','barcode','imei','phone','description','library'].some(k => String(h[k]||'').toLowerCase().includes(q))) return false;
    if (state.filterLib && h.library !== state.filterLib) return false;
    if (state.filterType && h.device_type !== state.filterType) return false;
    return true;
  });
  const col = state.sortCol;
  d.sort((a,b) => {
    let av = a[col] ?? '', bv = b[col] ?? '';
    if (col === 'copy_num' || col === 'days_overdue') { av = Number(av)||0; bv = Number(bv)||0; }
    else { av = String(av).toLowerCase(); bv = String(bv).toLowerCase(); }
    return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;
  });
  return d;
}

function sortBy(col) {
  if (state.sortCol === col) state.sortDir *= -1;
  else { state.sortCol = col; state.sortDir = 1; }
  renderCurrentView();
}

function th(col, label, cls='') {
  const icon = state.sortCol === col ? (state.sortDir === 1 ? '▲' : '▼') : '⇅';
  return `<th class="${cls}" onclick="sortBy('${col}')">${label} <span class="sort-icon">${icon}</span></th>`;
}

// ============================================================
// BADGE HELPERS
// ============================================================
function subBadge(sub) {
  const map = { Active:'badge-green', Deactivated:'badge-orange', Blocked:'badge-red', Expired:'badge-yellow', Unknown:'badge-gray' };
  return `<span class="badge ${map[sub]||'badge-gray'}">${sub}</span>`;
}
function procBadge(proc) {
  if (!proc) return '<span class="badge badge-green">In Stock</span>';
  const p = proc.toLowerCase();
  if (p === 'loan') return `<span class="badge badge-blue">Loan</span>`;
  if (p === 'lost') return `<span class="badge badge-red">Lost</span>`;
  if (p === 'missing') return `<span class="badge badge-orange">Missing</span>`;
  if (p === 'lost and paid') return `<span class="badge badge-red">Lost &amp; Paid</span>`;
  if (p === 'claimed returned') return `<span class="badge badge-purple">Claimed Ret.</span>`;
  return `<span class="badge badge-gray">${proc}</span>`;
}
function libBadge(lib) {
  if (!lib) return '—';
  if (lib.includes('NCC')) return `<span class="badge badge-purple">NCC</span>`;
  return `<span class="badge badge-blue">SLO</span>`;
}
function overdueBadge(h) {
  if (!h.is_overdue) return '—';
  const cls = h.days_overdue >= 180 ? 'overdue-severe' : h.days_overdue >= 90 ? 'overdue-warn' : '';
  return `<span class="${cls}">${h.days_overdue}d</span>`;
}

  ];

  ];
  else if (tabId === 'lost_missing') cols = [

  ];

  ];
  else if (tabId === 'to_be_reactivated') cols = [
    ['copy_num','Copy #'],['device_type','Type'],['barcode','Barcode'],['imei','IMEI'],['phone','Phone'],['library','Library'],['due_date','Due Date'],['exp_date','Sub Expires'],['sub_status','Sub Status']
  ];
  else if (tabId === 'to_deactivate') cols = [
    ['copy_num','Copy #'],['device_type','Type'],['barcode','Barcode'],['imei','IMEI'],['library','Library'],['due_date','Due Date'],['days_overdue','Days OD'],['exp_date','Sub Expires'],['sub_status','Sub Status'],['process_type','Process']
  ];
  else if (tabId === 'upcoming_renewals') cols = [
    ['copy_num','Copy #'],['device_type','Type'],['barcode','Barcode'],['imei','IMEI'],['phone','Phone'],['library','Library'],['due_date','Due Date'],['exp_date','Sub Expires'],['sub_status','Sub Status'],['process_type','Process']
  ];
  else if (tabId === 'sent_for_renewal') cols = [
    ['copy_num','Copy #'],['device_type','Type'],['barcode','Barcode'],['imei','IMEI'],['phone','Phone'],['library','Library'],['exp_date','Current Exp'],['sub_status','Sub Status'],['renewal_sent_date','Sent Date'],['process_type','Process']
  ];
  else cols = [
    ['copy_num','Copy #'],['device_type','Type'],['barcode','Barcode'],['imei','IMEI'],['library','Library'],['lis_status','Status'],['process_type','Process'],['exp_date','Exp Date'],['sub_status','Sub']
  ];

  let html = `<div class="table-wrap"><table><thead><tr>`;
  cols.forEach(([col,label]) => { html += th(col, label); });
  html += `</tr></thead><tbody>`;

  data.forEach(h => {
    html += `<tr class="clickable" onclick="showDetail('${h.barcode}')">`; 
    cols.forEach(([col]) => {
      if (col === 'copy_num') html += `<td class="td-main">c. ${h.copy_num ?? '?'}</td>`;
      else if (col === 'device_type') html += `<td><span class="badge ${h.device_type==='T10'?'badge-blue':'badge-purple'}">${h.device_type}</span>${h.program ? ' <span class="badge badge-yellow">'+h.program+'</span>' : ''}</td>`;
      else if (col === 'sub_status') html += `<td>${subBadge(h.sub_status)}</td>`;
      else if (col === 'process_type') html += `<td>${procBadge(h.process_type)}</td>`;
      else if (col === 'library') html += `<td>${libBadge(h.library)}</td>`;
      else if (col === 'due_date') html += `<td class="${h.is_overdue?'overdue-warn':''}">${formatDate(h.due_date)}</td>`;
      else if (col === 'exp_date') {
        const du = daysUntil(h.exp_date);
        const cls = du !== null && du < 0 ? 'overdue-severe' : du !== null && du < 60 ? 'overdue-warn' : '';
        html += `<td class="${cls}">${formatDate(h.exp_date)}</td>`;
      }
      else if (col === 'days_overdue') html += `<td>${overdueBadge(h)}</td>`;
      else if (col === 'imei') html += `<td>${h.imei || '—'}${!h.imei_verified && h.imei ? ' <span title="Unverified IMEI" style="color:var(--yellow)">⚠</span>' : ''}</td>`;

      else html += `<td>${h[col] || '—'}</td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

// ATTENTION PANEL LOGIC
// ============================================================
function buildAttentionItems() {
  const items = [];

  state.hotspots.forEach(h => {
    const tabs = h.tabs || [];
    const exp = h.exp_date || '';
    const proc = (h.process_type || '').toLowerCase().trim();
    const sub = h.sub_status || '';
    const daysOD = h.days_overdue || 0;
    const triggers = [];

    // CRITICAL: Active loan but deactivated/blocked (rule 3 updated) — needs immediate action
    if (h.attention_critical && tabs.includes('active_loans') && tabs.includes('archived')) {
      triggers.push({ tier: 'critical', tag: 'DEACTIVATED — STILL ON LOAN', tagClass: 'atag-red',
        detail: 'Service cut — device is out to a patron' });
    }

    // CRITICAL: Expiring within 30 days (on renewal list only — active loan or in-stock)
    if (exp && tabs.includes('upcoming_renewals')) {
      try {
        const daysLeft = Math.round((new Date(exp) - TODAY) / 86400000);
        if (daysLeft >= 0 && daysLeft <= 14) {
          triggers.push({ tier: 'critical', tag: daysLeft === 0 ? 'EXPIRES TODAY' : 'EXPIRING SOON', tagClass: 'atag-red', detail: daysLeft === 0 ? 'Today!' : daysLeft + 'd left' });
        } else if (daysLeft > 14 && daysLeft <= 30) {
          triggers.push({ tier: 'critical', tag: 'EXPIRING IN 30 DAYS', tagClass: 'atag-red', detail: daysLeft + 'd left' });
        }
      } catch {}
    }



    // CRITICAL: Lost/missing but subscription still actively running
    if (tabs.includes('lost_missing') && sub === 'Active') {
      triggers.push({ tier: 'critical', tag: 'LOST + ACTIVE SUB', tagClass: 'atag-red', detail: 'Wasting subscription $' });
    }

    // WARNING: Returned inactive/archived device — needs reactivation
    if (tabs.includes('to_be_reactivated')) {
      const reason = sub === 'Deactivated' ? 'Was deactivated' : sub === 'Blocked' ? 'Was blocked' : 'Subscription expired';
      triggers.push({ tier: 'warning', tag: 'RETURNED — REACTIVATE', tagClass: 'atag-yellow', detail: reason });
    }

    // WARNING: Overdue 30–59 days
    if (tabs.includes('overdue') && daysOD >= 30 && daysOD < 60) {
      triggers.push({ tier: 'warning', tag: 'OVERDUE 30+ DAYS', tagClass: 'atag-orange', detail: daysOD + 'd past due' });
    }

    // WARNING: Expiring in 31–60 days
    if (exp && tabs.includes('upcoming_renewals')) {
      try {
        const daysLeft = Math.round((new Date(exp) - TODAY) / 86400000);
        if (daysLeft > 30 && daysLeft <= 60) {
          triggers.push({ tier: 'warning', tag: 'EXPIRING IN 60 DAYS', tagClass: 'atag-orange', detail: daysLeft + 'd left' });
        }
      } catch {}
    }

    // WARNING: Lost/missing, not yet archived/deactivated — action needed
    if (tabs.includes('lost_missing') && !tabs.includes('archived')) {
      const label = proc === 'missing' ? 'MISSING' : proc === 'lost and paid' ? 'LOST & PAID' : 'MARKED LOST';
      if (sub !== 'Active') { // already caught by critical above if Active
        triggers.push({ tier: 'warning', tag: label, tagClass: 'atag-orange', detail: 'Not yet deactivated' });
      }
    }

    // INFO: Unverified IMEI
    if (h.imei && h.imei_verified === false) {
      triggers.push({ tier: 'info', tag: 'UNVERIFIED IMEI', tagClass: 'atag-blue', detail: 'Assumed, not confirmed' });
    }

    // INFO: No IMEI on record
    if (!h.imei) {
      triggers.push({ tier: 'info', tag: 'NO IMEI ON RECORD', tagClass: 'atag-blue', detail: 'Cannot match MB reports' });
    }

    // INFO: Newly overdue (under 30 days)
    if (tabs.includes('overdue') && daysOD > 0 && daysOD < 30) {
      triggers.push({ tier: 'info', tag: 'OVERDUE', tagClass: 'atag-blue', detail: daysOD + 'd past due' });
    }

    // INFO: Due back within 7 days (not yet overdue)
    if (h.due_date && !h.is_overdue && proc === 'loan') {
      try {
        const daysUntilDue = Math.round((new Date(h.due_date) - TODAY) / 86400000);
        if (daysUntilDue >= 0 && daysUntilDue <= 7) {
          triggers.push({ tier: 'info', tag: daysUntilDue === 0 ? 'DUE TODAY' : 'DUE SOON', tagClass: 'atag-blue', detail: daysUntilDue === 0 ? 'Due today' : 'Due in ' + daysUntilDue + 'd' });
        }
      } catch {}
    }

    if (triggers.length) items.push({ h, triggers });
  });

  return items;
}

function renderAttentionPanel() {
  const allItems = buildAttentionItems();
  const critical = allItems.filter(i => i.triggers.some(t => t.tier === 'critical'));
  const warning  = allItems.filter(i => !i.triggers.some(t => t.tier === 'critical') && i.triggers.some(t => t.tier === 'warning'));
  const info     = allItems.filter(i => i.triggers.every(t => t.tier === 'info'));

  const expanded = state.attentionExpanded !== false;
  const hdrClass = expanded ? '' : 'collapsed';

  function renderTierItems(items) {
    return items.map(({ h, triggers }) => {
      const tags = triggers.map(t => `<span class="atag ${t.tagClass}">${t.tag}</span>`).join(' ');
      const detail = triggers.map(t => t.detail).filter((v,i,a)=>a.indexOf(v)===i).join(' · ');
      const expStr = h.exp_date ? `exp ${formatDate(h.exp_date)}` : '';
      const typeClass = h.device_type === 'T10' ? 'badge-blue' : 'badge-purple';
      return `<div class="attn-item" style="cursor:pointer" onclick="showDetail('${h.barcode}')">
        <span class="ai-copy">c. ${h.copy_num ?? '?'}</span>
        <span class="ai-type"><span class="badge ${typeClass}">${h.device_type}</span>${h.program ? ' <span class="badge badge-yellow" style="font-size:9px">' + h.program + '</span>' : ''}</span>
        <span class="ai-tags">${tags}</span>
        <span class="ai-lib">${libBadge(h.library)}</span>
        <span class="ai-exp">${expStr}</span>
        <span class="ai-action">${detail}</span>
      </div>`;
    }).join('');
  }

  function renderTier(label, items, tierClass, tierKey) {
    if (!items.length) return '';
    const tierExp = state['attnTier_' + tierKey] !== false;
    const tierHdrClass = tierExp ? '' : 'collapsed';
    const tierBodyClass = tierExp ? '' : 'hidden';
    return `<div class="attn-tier ${tierClass}">
      <div class="attn-tier-header ${tierHdrClass}" onclick="toggleAttentionTier('${tierKey}')">
        ${label} <span style="opacity:0.6;font-weight:400">(${items.length})</span>
        <span class="tier-chevron">▼</span>
      </div>
      <div class="attn-tier-items ${tierBodyClass}">${renderTierItems(items)}</div>
    </div>`;
  }

  if (!allItems.length) {
    return `<div class="attention-panel">
      <div class="attention-header">
        <h4>⚡ Requires Attention</h4>
        <span style="font-size:11px;color:var(--green);font-family:'DM Mono',monospace">✓ All clear</span>
      </div>
    </div>`;
  }

  const bodyClass = expanded ? '' : 'hidden';
  return `<div class="attention-panel">
    <div class="attention-header ${hdrClass}" onclick="toggleAttentionPanel()">
      <h4>⚡ Requires Attention</h4>
      <div class="attn-counts">
        ${critical.length ? `<span class="badge badge-red">${critical.length} critical</span>` : ''}
        ${warning.length  ? `<span class="badge badge-yellow">${warning.length} warning</span>` : ''}
        ${info.length     ? `<span class="badge badge-blue">${info.length} info</span>` : ''}
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="attention-body ${bodyClass}">
      ${renderTier('🔴 Critical', critical, 'tier-critical', 'critical')}
      ${renderTier('🟡 Warning', warning, 'tier-warning', 'warning')}
      ${renderTier('🔵 Info', info, 'tier-info', 'info')}
    </div>
  </div>`;
}
