name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 9am UTC — well within the 7-day inactivity window
    - cron: '0 9 */3 * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://awvfgdiagcirrwrazzlo.supabase.co/rest/v1/hotspot_state?id=eq.main&select=id" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: unexpected response $response"
            exit 1
          fi
          echo "Supabase is alive — $(date)"
